<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — YAKUZAZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../yakuzaz.css">
  <style>
    /* YAKUZAZ DARK — reset-password.html */
    * { box-sizing: border-box; }
    body { background: #080808 !important; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    .rp-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .rp-card {
      background: #141414; border: 1px solid #252525; border-radius: 12px; padding: 40px;
      width: 100%; max-width: 420px;
      animation: rp-in 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    @keyframes rp-in { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .rp-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; text-decoration: none; }
    .rp-brand-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: #F2EDE4; letter-spacing: 0.05em; }
    .rp-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; color: #F2EDE4; margin-bottom: 6px; letter-spacing: -0.03em; }
    .rp-sub { color: #7A7A7A; font-size: .88rem; margin-bottom: 24px; }
    .rp-form { display: flex; flex-direction: column; gap: 14px; }
    .rp-form .fg { display: flex; flex-direction: column; gap: 5px; }
    .rp-form .fg label { font-size: .78rem; font-weight: 600; color: #7A7A7A; }
    .rp-form .fg input {
      padding: 11px 14px; border: 1px solid #252525; border-radius: 6px;
      font-size: .88rem; font-family: 'Space Grotesk', sans-serif; color: #F2EDE4;
      background: rgba(255,255,255,0.04); outline: none; transition: .18s;
    }
    .rp-form .fg input::placeholder { color: #3A3A3A; }
    .rp-form .fg input:focus { border-color: #4ade80; box-shadow: 0 0 0 3px rgba(74,222,128,0.08); }
    .rp-submit {
      background: #DC143C; color: #fff; border: none; border-radius: 4px;
      padding: 13px; font-size: .9rem; font-weight: 700; cursor: pointer; letter-spacing: 0.04em;
      transition: .18s; font-family: 'Space Grotesk', sans-serif; margin-top: 4px;
    }
    .rp-submit:hover { background: #c01234; }
    .rp-submit:disabled { opacity: .5; cursor: not-allowed; }
    .rp-err { background: rgba(220,20,60,0.08); color: #DC143C; border: 1px solid rgba(220,20,60,0.2); padding: 10px 14px; border-radius: 6px; font-size: .82rem; }
    .rp-success { text-align: center; padding: 12px 0; }
    .rp-success .big { font-size: 2.5rem; margin-bottom: 12px; }
    .rp-success strong { color: #F2EDE4; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; }
    .rp-success p { color: #7A7A7A; margin-top: 8px; font-size: .86rem; }
    .rp-success a {
      display: inline-block; margin-top: 16px; background: #DC143C; color: #fff;
      padding: 10px 24px; border-radius: 4px; text-decoration: none; font-weight: 700;
      font-size: .86rem; font-family: 'Space Grotesk', sans-serif;
    }
    .rp-back { display: block; text-align: center; margin-top: 20px; color: #4ade80; font-weight: 600; font-size: .84rem; text-decoration: none; }
    .rp-back:hover { text-decoration: underline; }
    .hidden { display: none !important; }
  </style>
  <link rel="stylesheet" href="../consumer/consumer-dark.css">
</head>
<body class="yk-dark">
  <header style="padding:16px 24px;border-bottom:1px solid #1e1e1e;background:rgba(8,8,8,0.97);display:flex;align-items:center;gap:10px"><a href="/" style="display:flex;align-items:center;gap:8px;text-decoration:none"><span style="font-size:1.3rem">🌿</span><span style="font-family:Space Grotesk,sans-serif;font-size:1.1rem;font-weight:700;color:#F2EDE4;letter-spacing:.05em">YAKUZAZ</span></a></header>

  <div class="rp-wrap">
    <div class="rp-card">
      <p class="rp-title">Set New Password</p>
      <p class="rp-sub">Enter your new password below.</p>

      <form id="rpForm" class="rp-form">
        <div class="fg">
          <label for="rp-pw">New Password</label>
          <input type="password" id="rp-pw" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
        </div>
        <div class="fg">
          <label for="rp-pw2">Confirm Password</label>
          <input type="password" id="rp-pw2" placeholder="Repeat password" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="rp-submit" id="rpBtn">Update Password</button>
        <div class="rp-err hidden" id="rp-err"></div>
      </form>

      <div id="rpSuccess" class="rp-success hidden">
        <div class="big">✅</div>
        <strong>Password updated!</strong>
        <p style="color:#6b7280;margin-top:8px;font-size:.88rem">You're now signed in.</p>
        <a href="/consumer/profile.html" style="display:inline-block;margin-top:16px;background:#DC143C;color:#fff;padding:10px 24px;border-radius:4px;text-decoration:none;font-weight:700;font-size:.88rem;font-family:Space Grotesk,sans-serif">
          Go to My Account →
        </a>
      </div>

      <a href="/consumer/login.html" style="display:block;text-align:center;margin-top:20px;color:#4ade80;font-weight:600;font-size:.86rem;text-decoration:none">
        ← Back to Sign In
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script>
    // Supabase automatically picks up the access_token from the URL hash
    // and fires onAuthStateChange('PASSWORD_RECOVERY') when the page loads
    _supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // User has clicked the reset link — they are now authenticated
        // Show the form (already visible by default)
      }
    });

    document.getElementById('rpForm').addEventListener('submit', async e => {
      e.preventDefault();
      const pw = document.getElementById('rp-pw').value;
      const pw2 = document.getElementById('rp-pw2').value;
      const err = document.getElementById('rp-err');
      const btn = document.getElementById('rpBtn');

      if (pw !== pw2) {
        err.textContent = 'Passwords do not match.';
        err.classList.remove('hidden');
        return;
      }

      btn.disabled = true; btn.textContent = 'Updating…';
      const { error } = await _supabase.auth.updateUser({ password: pw });

      if (error) {
        err.textContent = error.message;
        err.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Update Password';
        return;
      }

      document.getElementById('rpForm').classList.add('hidden');
      document.getElementById('rpSuccess').classList.remove('hidden');
    });
  </script>
</body>
</html>
