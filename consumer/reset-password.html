<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — YAKUZAZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../yakuzaz.css">
  <style>
    body { background: var(--green-50, #f0fdf4); min-height: 100vh; display: flex; flex-direction: column; }
    .rp-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .rp-card {
      background: #fff; border-radius: 24px; padding: 40px;
      width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(20,83,45,.12);
    }
    .rp-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; text-decoration: none; }
    .rp-brand-text { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700; color: #14532d; }
    .rp-title { font-family: 'Fraunces', serif; font-size: 1.75rem; font-weight: 700; color: #111827; margin-bottom: 6px; }
    .rp-sub { color: #6b7280; font-size: .9rem; margin-bottom: 22px; }
    .rp-form { display: flex; flex-direction: column; gap: 14px; }
    .rp-form .fg { display: flex; flex-direction: column; gap: 5px; }
    .rp-form .fg label { font-size: .82rem; font-weight: 600; color: #374151; }
    .rp-form .fg input {
      padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px;
      font-size: .9rem; font-family: 'Outfit', sans-serif; color: #1f2937;
      outline: none; transition: .18s;
    }
    .rp-form .fg input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.1); }
    .rp-submit {
      background: #16a34a; color: #fff; border: none; border-radius: 999px;
      padding: 12px; font-size: .9rem; font-weight: 700; cursor: pointer;
      transition: .18s; font-family: 'Outfit', sans-serif; margin-top: 4px;
    }
    .rp-submit:hover { background: #15803d; }
    .rp-submit:disabled { opacity: .55; cursor: not-allowed; }
    .rp-err { background: #fee2e2; color: #dc2626; padding: 10px 14px; border-radius: 10px; font-size: .84rem; }
    .rp-success { text-align: center; padding: 12px 0; }
    .rp-success .big { font-size: 2.5rem; margin-bottom: 12px; }
  </style>
  <link rel="stylesheet" href="../consumer/consumer-dark.css">
</head>
<body class="yk-dark">
  <header style="padding:16px 24px;border-bottom:1px solid #e5e7eb;background:#fff">
    <a href="/" style="display:flex;align-items:center;gap:8px;text-decoration:none">
      <span style="font-size:1.3rem">🌿</span>
      <span style="font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;color:#14532d">YAKUZAZ</span>
    </a>
  </header>

  <div class="rp-wrap">
    <div class="rp-card">
      <p class="rp-title">Set New Password</p>
      <p class="rp-sub">Enter your new password below.</p>

      <form id="rpForm" class="rp-form">
        <div class="fg">
          <label for="rp-pw">New Password</label>
          <input type="password" id="rp-pw" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
        </div>
        <div class="fg">
          <label for="rp-pw2">Confirm Password</label>
          <input type="password" id="rp-pw2" placeholder="Repeat password" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="rp-submit" id="rpBtn">Update Password</button>
        <div class="rp-err hidden" id="rp-err"></div>
      </form>

      <div id="rpSuccess" class="rp-success hidden">
        <div class="big">✅</div>
        <strong>Password updated!</strong>
        <p style="color:#6b7280;margin-top:8px;font-size:.88rem">You're now signed in.</p>
        <a href="/consumer/profile.html" style="display:inline-block;margin-top:16px;background:#16a34a;color:#fff;padding:10px 24px;border-radius:999px;text-decoration:none;font-weight:700;font-size:.88rem;font-family:'Outfit',sans-serif">
          Go to My Account →
        </a>
      </div>

      <a href="/consumer/login.html" style="display:block;text-align:center;margin-top:20px;color:#16a34a;font-weight:600;font-size:.88rem;text-decoration:none">
        ← Back to Sign In
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script>
    // Supabase automatically picks up the access_token from the URL hash
    // and fires onAuthStateChange('PASSWORD_RECOVERY') when the page loads
    _supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // User has clicked the reset link — they are now authenticated
        // Show the form (already visible by default)
      }
    });

    document.getElementById('rpForm').addEventListener('submit', async e => {
      e.preventDefault();
      const pw = document.getElementById('rp-pw').value;
      const pw2 = document.getElementById('rp-pw2').value;
      const err = document.getElementById('rp-err');
      const btn = document.getElementById('rpBtn');

      if (pw !== pw2) {
        err.textContent = 'Passwords do not match.';
        err.classList.remove('hidden');
        return;
      }

      btn.disabled = true; btn.textContent = 'Updating…';
      const { error } = await _supabase.auth.updateUser({ password: pw });

      if (error) {
        err.textContent = error.message;
        err.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Update Password';
        return;
      }

      document.getElementById('rpForm').classList.add('hidden');
      document.getElementById('rpSuccess').classList.remove('hidden');
    });
  </script>
</body>
</html>
