<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — YAKUZAZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../yakuzaz.css">
  <style>
    /* YAKUZAZ DARK — profile.html */
    * { box-sizing: border-box; }
    body { background: #080808 !important; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }

    .pf-header {
      background: rgba(8,8,8,0.97); border-bottom: 1px solid #1e1e1e;
      padding: 14px 32px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .pf-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .pf-brand-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: #F2EDE4; letter-spacing: 0.05em; }
    .pf-signout {
      background: none; border: 1px solid #252525; border-radius: 4px;
      padding: 7px 16px; font-size: .8rem; font-weight: 600; cursor: pointer;
      color: #7A7A7A; font-family: 'Space Grotesk', sans-serif; transition: .18s;
    }
    .pf-signout:hover { border-color: #DC143C; color: #DC143C; }

    .pf-main { max-width: 860px; margin: 0 auto; padding: 40px 24px; display: flex; flex-direction: column; gap: 16px; }

    .pf-card {
      background: #141414; border-radius: 10px;
      padding: 28px 32px; border: 1px solid #222;
      animation: pf-card-in 0.55s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes pf-card-in { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .pf-card:nth-child(1){animation-delay:0.05s}.pf-card:nth-child(2){animation-delay:0.12s}
    .pf-card:nth-child(3){animation-delay:0.19s}.pf-card:nth-child(4){animation-delay:0.26s}

    .pf-card-title {
      font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 700;
      color: #F2EDE4; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
      letter-spacing: -0.02em;
    }

    /* Profile overview */
    .pf-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(220,20,60,0.12); border: 1px solid rgba(220,20,60,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 800; color: #DC143C; flex-shrink: 0;
    }
    .pf-info-row { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; }
    .pf-info-name { font-size: 1.05rem; font-weight: 700; color: #F2EDE4; font-family: 'Space Grotesk', sans-serif; }
    .pf-info-role {
      display: inline-block; font-size: .65rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; background: rgba(74,222,128,0.08); color: #4ade80;
      padding: 3px 10px; border-radius: 2px; border: 1px solid rgba(74,222,128,0.2);
    }
    .pf-info-email { font-size: .84rem; color: #7A7A7A; margin-top: 2px; }

    /* Loyalty points display */
    .pf-loyalty {
      display: flex; align-items: center; gap: 12px;
      background: rgba(220,20,60,0.06); border: 1px solid rgba(220,20,60,0.15);
      border-radius: 8px; padding: 14px 18px; margin-bottom: 20px;
    }
    .pf-loyalty-pts { font-size: 1.6rem; font-weight: 700; color: #DC143C; font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.03em; }
    .pf-loyalty-label { font-size: .78rem; color: #7A7A7A; }
    .pf-loyalty-sub   { font-size: .7rem; color: #5A5A5A; margin-top: 1px; }

    /* Edit form */
    .pf-form { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .pf-fg { display: flex; flex-direction: column; gap: 5px; }
    .pf-fg label { font-size: .76rem; font-weight: 600; color: #7A7A7A; }
    .pf-fg input {
      padding: 10px 13px; border: 1px solid #252525; border-radius: 6px;
      font-size: .86rem; font-family: 'Space Grotesk', sans-serif; color: #F2EDE4;
      background: rgba(255,255,255,0.04); outline: none; transition: .18s;
    }
    .pf-fg input::placeholder { color: #3A3A3A; }
    .pf-fg input:focus { border-color: #4ade80; box-shadow: 0 0 0 3px rgba(74,222,128,0.08); }
    .pf-save {
      margin-top: 8px; background: #DC143C; color: #fff; border: none;
      border-radius: 4px; padding: 11px 28px; font-size: .86rem; font-weight: 700;
      cursor: pointer; transition: .18s; font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.04em;
    }
    .pf-save:hover { background: #c01234; }

    /* Orders */
    .pf-order-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-radius: 8px; background: #1a1a1a;
      margin-bottom: 8px; border: 1px solid #222; transition: border-color 0.2s;
    }
    .pf-order-row:hover { border-color: rgba(74,222,128,0.2); }
    .pf-order-num { font-size: .8rem; font-weight: 700; color: #DC143C; font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.04em; }
    .pf-order-date { font-size: .74rem; color: #5A5A5A; margin-top: 2px; }
    .pf-order-total { font-size: .9rem; font-weight: 700; color: #4ade80; }
    .pf-order-status {
      font-size: .65rem; font-weight: 700; padding: 3px 10px; border-radius: 2px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .pf-status-pending  { background: rgba(251,191,36,0.08); color: #FBBF24; border: 1px solid rgba(251,191,36,0.2); }
    .pf-status-confirmed{ background: rgba(96,165,250,0.08); color: #60a5fa; border: 1px solid rgba(96,165,250,0.2); }
    .pf-status-delivered{ background: rgba(74,222,128,0.08); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }

    /* Scan history */
    .pf-scan-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #1a1a1a; font-size: .86rem;
    }
    .pf-scan-row:last-child { border-bottom: none; }
    .pf-scan-slug { font-weight: 600; color: #F2EDE4; }
    .pf-scan-time { color: #5A5A5A; font-size: .78rem; }

    .pf-empty { color: #3A3A3A; font-size: .86rem; padding: 8px 0; }

    /* Danger zone */
    .pf-danger-zone { border-color: rgba(220,20,60,0.2) !important; }
    .pf-danger-btn {
      background: transparent; border: 1px solid rgba(220,20,60,0.3); color: #DC143C;
      border-radius: 4px; padding: 9px 20px; font-size: .82rem; font-weight: 700;
      cursor: pointer; font-family: 'Space Grotesk', sans-serif; transition: .18s;
    }
    .pf-danger-btn:hover { background: rgba(220,20,60,0.08); }

    @media (max-width: 600px) {
      .pf-form { grid-template-columns: 1fr; }
      .pf-header { padding: 14px 16px; }
      .pf-card { padding: 20px 16px; }
    }
  </style>
  <link rel="stylesheet" href="../consumer/consumer-dark.css">
</head>
<body class="yk-dark">

  <header class="pf-header">
    <a href="/" class="pf-brand">
      <span>🌿</span>
      <span class="pf-brand-name">YAKUZAZ</span>
    </a>
    <button class="pf-signout" id="signoutBtn">Sign Out</button>
  </header>

  <div class="pf-main" id="main">
    <div style="color:#9ca3af;text-align:center;padding:60px 0">Loading…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script>
    let profile = null;
    let scans = [];
    let orders = [];
    let loyaltyTxns = [];

    (async () => {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) { window.location.href = '/consumer/login.html'; return; }

      const [{ data: p }, { data: s }, { data: o }, { data: lt }] = await Promise.all([
        _supabase.from('profiles').select('*').eq('id', session.user.id).single(),
        _supabase.from('qr_scans').select('*').eq('user_id', session.user.id).order('scanned_at', { ascending: false }).limit(20),
        _supabase.from('orders').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false }).limit(20),
        _supabase.from('loyalty_txns').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false }).limit(10)
      ]);

      profile = p || { email: session.user.email, full_name: '', role: 'consumer' };
      scans = s || [];
      orders = o || [];
      loyaltyTxns = lt || [];
      render();
    })();

    document.getElementById('signoutBtn').addEventListener('click', async () => {
      await _supabase.auth.signOut();
      window.location.href = '/';
    });

    function fmtDt(d) {
      if (!d) return '';
      return new Date(d).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function initials(name) {
      return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function render() {
      document.getElementById('main').innerHTML = `
        <!-- Profile Card -->
        <div class="pf-card">
          <div class="pf-info-row">
            <div class="pf-avatar">${initials(profile.full_name)}</div>
            <div>
              <div class="pf-info-name">${profile.full_name || 'YAKUZAZ Member'}</div>
              <div class="pf-info-email">${profile.email}</div>
              <span class="pf-info-role" style="margin-top:4px;display:inline-block">${profile.role}</span>
            </div>
          </div>

          <div class="pf-card-title">✏️ Edit Profile</div>
          <form id="profileForm">
            <div class="pf-form">
              <div class="pf-fg">
                <label>Full Name</label>
                <input type="text" id="pf-name" value="${profile.full_name || ''}" placeholder="Your name">
              </div>
              <div class="pf-fg">
                <label>City</label>
                <input type="text" id="pf-city" value="${profile.city || ''}" placeholder="Delhi">
              </div>
              <div class="pf-fg">
                <label>Phone</label>
                <input type="tel" id="pf-phone" value="${profile.phone || ''}" placeholder="+91 98xxx xxxxx">
              </div>
              <div class="pf-fg">
                <label>Email <span style="color:#9ca3af;font-weight:400">(read-only)</span></label>
                <input type="email" value="${profile.email}" readonly style="background:#f9fafb;color:#9ca3af;cursor:not-allowed">
              </div>
            </div>
            <div style="margin-top:16px">
              <button type="submit" class="pf-save" id="saveBtn">Save Changes</button>
              <span id="saveMsg" style="margin-left:12px;color:#16a34a;font-size:.87rem;font-weight:600;display:none">Saved ✓</span>
            </div>
          </form>
        </div>

        <!-- Loyalty Points -->
        <div class="pf-card">
          <div class="pf-card-title">⭐ Loyalty Points</div>
          <div style="display:flex;align-items:center;gap:16px;background:#fffbeb;border:1.5px solid #fde047;border-radius:12px;padding:16px 20px">
            <div style="text-align:center">
              <div style="font-size:2rem;font-weight:800;color:#d97706;font-family:'Outfit',sans-serif">${profile.loyalty_points || 0}</div>
              <div style="font-size:.75rem;color:#92400e;font-weight:600">points</div>
            </div>
            <div>
              <div style="font-weight:700;color:#92400e;margin-bottom:2px">Your Reward Balance</div>
              <div style="font-size:.8rem;color:#b45309">Earn 1 pt per ₹10 spent</div>
              <div style="font-size:.8rem;color:#b45309">50 pts = ₹5 off at checkout</div>
            </div>
          </div>
          ${loyaltyTxns.length ? `
          <div style="margin-top:16px">
            <div style="font-weight:600;color:#374151;font-size:.85rem;margin-bottom:8px">Recent Activity</div>
            ${loyaltyTxns.map(t => `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6">
                <span style="font-size:.85rem;color:#374151">${t.reason || (t.points > 0 ? 'Earned from order' : 'Redeemed at checkout')}</span>
                <span style="font-weight:700;font-size:.88rem;color:${t.points > 0 ? '#16a34a' : '#d97706'}">${t.points > 0 ? '+' : ''}${t.points} pts</span>
              </div>`).join('')}
          </div>` : '<p class="pf-empty" style="margin-top:12px">Place an order to start earning points!</p>'}
        </div>

        <!-- Order History -->
        <div class="pf-card">
          <div class="pf-card-title">📦 Order History</div>
          ${orders.length ? orders.map(o => `
            <div style="padding:14px 0;border-bottom:1px solid #f3f4f6">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
                <div style="font-weight:700;color:#111827;font-size:.92rem">#${o.order_number || o.id}</div>
                <span style="font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:999px;background:${
                  o.status==='delivered'?'#16a34a':o.status==='ready'?'#2563eb':o.status==='cancelled'?'#dc2626':'#d97706'
                };color:#fff">${o.status}</span>
              </div>
              <div style="font-size:.82rem;color:#6b7280;margin-bottom:4px">${fmtDt(o.created_at)}${o.pickup_date ? ' · Pickup: ' + o.pickup_date : ''}</div>
              <div style="font-weight:700;color:#16a34a">₹${o.total}</div>
            </div>`).join('') : '<p class="pf-empty">No orders yet. <a href="/category.html" style="color:#16a34a;font-weight:600">Start shopping →</a></p>'}
        </div>

        <!-- QR Scan History -->
        <div class="pf-card">
          <div class="pf-card-title">📱 QR Scan History</div>
          ${scans.length ? scans.map(s => `
            <div class="pf-scan-row">
              <div>
                <div class="pf-scan-slug">${s.product_slug || 'Unknown product'}</div>
                ${s.batch_code ? `<div style="font-size:.78rem;color:#9ca3af">Batch: ${s.batch_code}</div>` : ''}
              </div>
              <div class="pf-scan-time">${fmtDt(s.scanned_at)}</div>
            </div>`).join('')
          : '<p class="pf-empty">No QR scans recorded yet. Scan a product QR to see history here.</p>'}
        </div>

        <!-- Quick links -->
        <div class="pf-card" style="display:flex;gap:12px;flex-wrap:wrap">
          <a href="/" style="color:#16a34a;font-weight:600;text-decoration:none;font-size:.9rem">🏠 Home</a>
          <a href="/category.html" style="color:#16a34a;font-weight:600;text-decoration:none;font-size:.9rem">🥬 Shop</a>
          <a href="/#walking-mandi" style="color:#16a34a;font-weight:600;text-decoration:none;font-size:.9rem">📍 Walking Mandi</a>
        </div>`;

      document.getElementById('profileForm').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.textContent = 'Saving…';
        const { error } = await _supabase.from('profiles').update({
          full_name: document.getElementById('pf-name').value.trim(),
          city:      document.getElementById('pf-city').value.trim() || null,
          phone:     document.getElementById('pf-phone').value.trim() || null,
          updated_at: new Date().toISOString()
        }).eq('id', profile.id);
        btn.disabled = false; btn.textContent = 'Save Changes';
        if (!error) {
          const msg = document.getElementById('saveMsg');
          msg.style.display = 'inline'; setTimeout(() => msg.style.display = 'none', 2500);
        }
      });
    }
  </script>
</body>
</html>
