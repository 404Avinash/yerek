<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16a34a">
  <link rel="manifest" href="/manifest.json">
  <title>My Cart — YAKUZAZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../yakuzaz.css">
  <style>
    /* YAKUZAZ DARK — cart.html */
    * { box-sizing: border-box; }
    body {
      background: #080808 !important;
      font-family: 'Space Grotesk', 'Outfit', sans-serif;
      min-height: 100vh;
    }
    .cart-header {
      background: rgba(8,8,8,0.97); border-bottom: 1px solid #222;
      padding: 14px 32px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .cart-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .cart-brand-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; color: #F2EDE4; letter-spacing: 0.05em; }
    .cart-main { max-width: 700px; margin: 0 auto; padding: 28px 20px 120px; }
    .cart-title { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; color: #F2EDE4; margin-bottom: 24px; letter-spacing: -0.03em; animation: yk-fade-up 0.6s ease 0.1s both; }

    .cart-item {
      background: #141414; border-radius: 10px; padding: 14px 16px;
      margin-bottom: 8px; display: flex; align-items: center; gap: 14px;
      border: 1px solid #222;
      animation: yk-fade-up 0.5s cubic-bezier(0.16,1,0.3,1) both;
      transition: border-color 0.2s;
    }
    .cart-item:nth-child(1){animation-delay:0.05s} .cart-item:nth-child(2){animation-delay:0.1s}
    .cart-item:nth-child(3){animation-delay:0.15s} .cart-item:nth-child(4){animation-delay:0.2s}
    .cart-item:hover { border-color: rgba(74,222,128,0.25); }
    .ci-emoji { font-size: 2rem; flex-shrink: 0; }
    .ci-info { flex: 1; min-width: 0; }
    .ci-name { font-size: .92rem; font-weight: 700; color: #F2EDE4; font-family: 'Space Grotesk', sans-serif; }
    .ci-price { font-size: .78rem; color: #5A5A5A; margin-top: 1px; }
    .ci-savings { font-size: .72rem; color: #4ade80; font-weight: 600; }
    .ci-qty {
      display: flex; align-items: center; gap: 0;
      background: #1a1a1a; border: 1px solid #333; border-radius: 6px; overflow: hidden;
    }
    .ci-qty button {
      background: none; border: none; font-size: 1rem; cursor: pointer;
      color: #F2EDE4; font-weight: 800; line-height: 1; padding: 8px 12px;
      transition: background .12s, color .12s;
    }
    .ci-qty button:hover { background: rgba(220,20,60,0.15); color: #DC143C; }
    .ci-qty span { font-size: .82rem; font-weight: 700; color: #F2EDE4; min-width: 44px; text-align: center; font-family: 'Space Grotesk', sans-serif; }
    .ci-subtotal { font-size: .95rem; font-weight: 800; color: #4ade80; min-width: 54px; text-align: right; font-family: 'Space Grotesk', sans-serif; }
    .ci-remove { background: none; border: none; cursor: pointer; color: #3A3A3A; font-size: 1rem; padding: 4px; transition: color .18s; }
    .ci-remove:hover { color: #DC143C; }

    .savings-banner {
      background: rgba(74,222,128,0.06); border: 1px solid rgba(74,222,128,0.2);
      border-radius: 8px; padding: 12px 16px;
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
      animation: yk-fade-up 0.5s ease 0s both;
    }
    .savings-banner-icon { font-size: 1.3rem; }
    .savings-banner-text { font-size: .88rem; font-weight: 600; color: #AAAAAA; }
    .savings-banner-amt { font-size: .95rem; font-weight: 800; color: #4ade80; margin-left: auto; }

    .cart-bill {
      background: #141414; border-radius: 10px; padding: 20px;
      margin-top: 14px; border: 1px solid #222;
    }
    .bill-title { font-size: .72rem; font-weight: 700; color: #5A5A5A; text-transform: uppercase; letter-spacing: .14em; margin-bottom: 14px; font-family: 'Space Grotesk', sans-serif; }
    .bill-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: .86rem; color: #AAAAAA; }
    .bill-row + .bill-row { border-top: 1px solid #1a1a1a; }
    .bill-row.saving { color: #4ade80; }
    .bill-row.total { font-size: 1.02rem; font-weight: 800; color: #F2EDE4; border-top: 1px solid #333 !important; padding-top: 14px; margin-top: 4px; }

    .cart-notes {
      background: #141414; border-radius: 10px; padding: 16px 20px;
      margin-top: 12px; border: 1px solid #222;
    }
    .notes-label { font-size: .78rem; font-weight: 700; color: #7A7A7A; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .notes-input {
      width: 100%; padding: 10px 14px; border: 1px solid #252525; border-radius: 6px;
      font-size: .83rem; font-family: 'Space Grotesk', sans-serif; resize: none; outline: none;
      color: #F2EDE4; background: rgba(255,255,255,0.04); box-sizing: border-box; transition: border-color .18s;
    }
    .notes-input:focus { border-color: #4ade80; }

    .cart-suggest { margin-top: 20px; }
    .suggest-title { font-size: .7rem; font-weight: 700; color: #5A5A5A; text-transform: uppercase; letter-spacing: .14em; margin-bottom: 12px; }
    .suggest-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .suggest-scroll::-webkit-scrollbar { display: none; }
    .suggest-card {
      flex-shrink: 0; width: 130px; background: #141414; border-radius: 8px;
      border: 1px solid #252525; overflow: hidden; transition: border-color .18s; cursor: pointer;
    }
    .suggest-card:hover { border-color: rgba(74,222,128,0.3); }
    .suggest-emoji { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 2.4rem; background: #1a1a1a; }
    .suggest-body { padding: 8px 10px; }
    .suggest-name { font-size: .78rem; font-weight: 700; color: #F2EDE4; }
    .suggest-price { font-size: .72rem; color: #5A5A5A; margin-top: 2px; }
    .suggest-add {
      width: 100%; background: rgba(74,222,128,0.06); border: 1px solid rgba(74,222,128,0.2); color: #4ade80;
      border-radius: 4px; padding: 5px; font-size: .72rem; font-weight: 700;
      cursor: pointer; font-family: 'Space Grotesk', sans-serif; margin-top: 6px; transition: .15s;
    }
    .suggest-add:hover { background: rgba(74,222,128,0.15); }

    .cart-checkout-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(8,8,8,0.98); border-top: 1px solid #252525;
      padding: 14px 20px; z-index: 100;
      backdrop-filter: blur(16px);
    }
    .cart-checkout-inner { max-width: 700px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .cart-checkout-total { font-size: 1rem; font-weight: 800; color: #F2EDE4; font-family: 'Space Grotesk', sans-serif; }
    .cart-checkout-total small { display: block; font-size: .7rem; font-weight: 500; color: #5A5A5A; }
    .cs-checkout {
      background: #DC143C; color: #fff; border: none; border-radius: 4px;
      padding: 12px 28px; font-size: .9rem; font-weight: 700; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif; text-decoration: none; transition: background .18s;
      white-space: nowrap; letter-spacing: 0.03em;
    }
    .cs-checkout:hover { background: #c01234; }
    .cart-empty {
      text-align: center; padding: 80px 20px;
      background: #141414; border-radius: 12px; border: 1px solid #222;
    }
    .cart-empty .big { font-size: 3.5rem; margin-bottom: 16px; }
    .cart-empty h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; color: #F2EDE4; margin-bottom: 8px; letter-spacing: -0.03em; }
    .cart-empty p { color: #7A7A7A; font-size: .9rem; margin-bottom: 24px; }
    .cart-empty a {
      display: inline-block; background: #DC143C; color: #fff; padding: 12px 28px;
      border-radius: 4px; text-decoration: none; font-weight: 700; font-size: .88rem;
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
  <link rel="stylesheet" href="../consumer/consumer-dark.css">
</head>
<body class="yk-dark">
  <header class="cart-header">
    <a href="/" class="cart-brand">
      <span style="font-size:1.3rem">🌿</span>
      <span class="cart-brand-name">YAKUZAZ</span>
    </a>
    <a href="/consumer/login.html" id="cartAccBtn" style="font-size:.82rem;font-weight:600;color:#16a34a;text-decoration:none">My Account</a>
  </header>

  <div class="cart-main">
    <h1 class="cart-title">🛒 My Cart</h1>
    <div id="cartContent"></div>
  </div>

  <!-- STICKY CHECKOUT FOOTER -->
  <div class="cart-checkout-footer" id="cartFooter" style="display:none">
    <div class="cart-checkout-inner">
      <div class="cart-checkout-total">
        <span id="cartFooterTotal">₹0</span>
        <small id="cartFooterSub"></small>
      </div>
      <a href="/consumer/checkout.html" class="cs-checkout">Proceed to Checkout →</a>
    </div>
  </div>

  <script src="/js/cart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script>
    (async () => {
      const { data: { session } } = await _supabase.auth.getSession();
      if (session) {
        const btn = document.getElementById('cartAccBtn');
        btn.href = '/consumer/profile.html';
        btn.textContent = '👤 My Account';
      }
    })();

    // MRP lookup (same as category data) — for savings calculation
    const ITEM_MRP = {
      'spinach':60,'coriander':75,'fenugreek':65,'lettuce':100,'mint':90,'amaranth':60,
      'carrot':55,'radish':40,'beetroot':65,'turnip':45,
      'potato':35,'sweet-potato':60,'yam':70,'colocasia':75,
      'tomato':50,'capsicum':100,'brinjal':55,'chilly':110,'peas':90,'bitter-gourd':65,
      'banana':65,'apple':200,'orange':100,'papaya':60,'guava':80,'pomegranate':160,
    };

    // Suggested items (simple cross-sell list)
    const SUGGESTIONS = [
      { slug:'spinach', name:'Spinach', emoji:'🥬', price:40 },
      { slug:'tomato', name:'Tomato', emoji:'🍅', price:35 },
      { slug:'coriander', name:'Coriander', emoji:'🌿', price:60 },
      { slug:'carrot', name:'Carrot', emoji:'🥕', price:40 },
      { slug:'potato', name:'Potato', emoji:'🥔', price:25 },
      { slug:'capsicum', name:'Capsicum', emoji:'🫑', price:80 },
      { slug:'mint', name:'Mint', emoji:'🌿', price:70 },
      { slug:'banana', name:'Banana', emoji:'🍌', price:50 },
    ];

    function renderCart() {
      const cart = getCart();
      const container = document.getElementById('cartContent');

      if (!cart.length) {
        container.innerHTML = `
          <div class="cart-empty">
            <div class="big">🛒</div>
            <h2>Your cart is empty</h2>
            <p>Add some fresh produce and come back here to checkout.</p>
            <a href="/category.html?cat=leafy">Browse Vegetables →</a>
          </div>`;
        document.getElementById('cartFooter').style.display = 'none';
        return;
      }

      const itemTotal = getCartTotal();
      const totalMrpSavings = cart.reduce((s, item) => {
        const mrp = ITEM_MRP[item.slug] || item.price;
        return s + Math.max(0, Math.round((mrp - item.price) * item.qty));
      }, 0);

      // Items HTML
      let itemsHtml = cart.map(item => {
        const sub = Math.round(item.price * item.qty);
        const mrp = ITEM_MRP[item.slug] || item.price;
        const saved = Math.max(0, Math.round((mrp - item.price) * item.qty));
        return `
        <div class="cart-item" id="ci-${item.slug}">
          <div class="ci-emoji">${item.emoji}</div>
          <div class="ci-info">
            <div class="ci-name">${item.name}</div>
            <div class="ci-price">₹${item.price}/kg${mrp > item.price ? ` · <s style="color:#d1d5db">₹${mrp}</s>` : ''}</div>
            ${saved > 0 ? `<div class="ci-savings">You save ₹${saved}</div>` : ''}
          </div>
          <div class="ci-qty">
            <button onclick="changeQty('${item.slug}', -0.5)">−</button>
            <span>${item.qty} kg</span>
            <button onclick="changeQty('${item.slug}', 0.5)">+</button>
          </div>
          <div class="ci-subtotal">₹${sub}</div>
          <button class="ci-remove" onclick="removeItem('${item.slug}')" title="Remove">✕</button>
        </div>`;
      }).join('');

      // Savings banner
      const savingsBanner = totalMrpSavings > 0 ? `
        <div class="savings-banner">
          <span class="savings-banner-icon">🎉</span>
          <span class="savings-banner-text">Great deal! You're saving</span>
          <span class="savings-banner-amt">₹${totalMrpSavings}</span>
        </div>` : '';

      // Bill details
      const itemCount = cart.reduce((s, i) => s + i.qty, 0);
      const billHtml = `
        <div class="cart-bill">
          <div class="bill-title">Bill Details</div>
          <div class="bill-row"><span>Item Total (${cart.length} items, ${itemCount.toFixed(1)} kg)</span><span>₹${itemTotal}${totalMrpSavings > 0 ? ` <s style="font-size:.78rem;color:#d1d5db">₹${itemTotal + totalMrpSavings}</s>` : ''}</span></div>
          ${totalMrpSavings > 0 ? `<div class="bill-row saving"><span>🏷️ Total Savings</span><span>−₹${totalMrpSavings}</span></div>` : ''}
          <div class="bill-row"><span>Packaging</span><span style="color:#16a34a;font-weight:700">FREE</span></div>
          <div class="bill-row"><span>Store Pickup</span><span style="color:#16a34a;font-weight:700">FREE</span></div>
          <div class="bill-row total"><span>To Pay</span><span>₹${itemTotal}</span></div>
        </div>`;

      // Order notes
      const notesHtml = `
        <div class="cart-notes">
          <div class="notes-label">📝 Add Order Notes <span style="font-size:.72rem;font-weight:500;color:#9ca3af">(optional)</span></div>
          <textarea id="cartNotes" class="notes-input" rows="2" placeholder="E.g. Please keep coriander fresh, prefer medium-sized carrots…" oninput="localStorage.setItem('YAKUZAZ_cart_notes',this.value)">${localStorage.getItem('YAKUZAZ_cart_notes')||''}</textarea>
        </div>`;

      // Suggestions (exclude items already in cart)
      const cartSlugs = new Set(cart.map(i => i.slug));
      const suggestions = SUGGESTIONS.filter(s => !cartSlugs.has(s.slug)).slice(0, 6);
      const suggestHtml = suggestions.length ? `
        <div class="cart-suggest">
          <div class="suggest-title">You Might Also Need</div>
          <div class="suggest-scroll">
            ${suggestions.map(s => `
              <div class="suggest-card" onclick="window.location.href='/product.html?item=${s.slug}'">
                <div class="suggest-emoji">${s.emoji}</div>
                <div class="suggest-body">
                  <div class="suggest-name">${s.name}</div>
                  <div class="suggest-price">₹${s.price}/kg</div>
                  <button class="suggest-add" onclick="event.stopPropagation();addToCart('${s.slug}','${s.name}','${s.emoji}',${s.price});renderCart()">+ Add</button>
                </div>
              </div>`).join('')}
          </div>
        </div>` : '';

      // Pickup note
      const pickupHtml = `<div style="background:#f0fdf4;border:1px solid #d1fae5;border-radius:12px;padding:10px 14px;font-size:.82rem;color:#166534;margin-top:14px;display:flex;align-items:center;gap:8px">
        <span>📦</span> <span><b>Store Pickup</b> · YAKUZAZ Store, Delhi · Packaging free on all orders</span>
      </div>`;

      container.innerHTML = savingsBanner + itemsHtml + pickupHtml + billHtml + notesHtml + suggestHtml;

      // Update sticky footer
      const footer = document.getElementById('cartFooter');
      footer.style.display = 'block';
      document.getElementById('cartFooterTotal').textContent = `₹${itemTotal}`;
      document.getElementById('cartFooterSub').textContent = `${cart.length} item${cart.length !== 1 ? 's' : ''} · ${itemCount.toFixed(1)} kg`;
    }

    function changeQty(slug, delta) {
      const cart = getCart();
      const item = cart.find(i => i.slug === slug);
      if (!item) return;
      const newQty = +(item.qty + delta).toFixed(1);
      if (newQty <= 0) { removeItem(slug); return; }
      updateQty(slug, Math.min(newQty, 10));
      renderCart();
    }

    function removeItem(slug) {
      removeFromCart(slug);
      renderCart();
    }

    renderCart();
  </script>
</body>
</html>
